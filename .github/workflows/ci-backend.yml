name: CI - Back-End

on:
  push:
    branches: [main, master]
    paths:
      - "back-end/**"
      - "package.json"
      - "package-lock.json"
      - "nx.json"
      - "tsconfig.base.json"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "back-end/**"
      - "package.json"
      - "package-lock.json"
      - "nx.json"
      - "tsconfig.base.json"
      - ".github/workflows/ci-backend.yml"

jobs:
  backend:
    name: Back-End Pipeline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npx nx lint back-end

      - name: Test
        run: npx nx test back-end
        env:
          JWT_SECRET: test_secret
          DB_TYPE: sqlite

      - name: Build
        run: npx nx build back-end
